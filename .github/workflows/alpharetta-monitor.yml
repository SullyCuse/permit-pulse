name: Alpharetta Feed Monitor

on:
  schedule:
    # 12:00 UTC = 8:00 AM ET daily
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check Alpharetta ArcGIS feed
        id: check
        run: |
          node - <<'EOF'
          const https = require('https');

          const BASE = 'https://alphagis.alpharetta.ga.us/arcgis/rest/services/OpenData/OpenData_PCE_Full/FeatureServer';
          // Last known good permit date (commercial layer, May 13 2026)
          const STALE_CUTOFF = "timestamp '2026-05-13 16:00:00'";

          function query(layer) {
            return new Promise((resolve, reject) => {
              const params = new URLSearchParams({
                where: `DATE_ENTERED > ${STALE_CUTOFF}`,
                outFields: 'CASE_NUMBER,DATE_ENTERED,CASE_TYPE_DESC',
                orderByFields: 'DATE_ENTERED DESC',
                resultRecordCount: '5',
                f: 'json',
              });
              const url = `${BASE}/${layer}/query?${params}`;
              https.get(url, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
          }

          async function main() {
            const [commercial, residential] = await Promise.all([query(1), query(3)]);
            const all = [
              ...(commercial.features || []),
              ...(residential.features || []),
            ];

            if (all.length === 0) {
              console.log('No new permits yet — feed still stale after 2026-05-13.');
              process.exit(0);
            }

            const newest = all.reduce((a, b) =>
              (a.attributes.DATE_ENTERED > b.attributes.DATE_ENTERED ? a : b)
            );
            const newestDate = new Date(newest.attributes.DATE_ENTERED).toISOString().split('T')[0];

            console.log(`FEED_RESUMED=true`);
            console.log(`NEW_COUNT=${all.length}`);
            console.log(`NEWEST_DATE=${newestDate}`);
            console.log(`NEWEST_CASE=${newest.attributes.CASE_NUMBER}`);

            // Write to GITHUB_OUTPUT
            const fs = require('fs');
            const out = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(out, `feed_resumed=true\n`);
            fs.appendFileSync(out, `new_count=${all.length}\n`);
            fs.appendFileSync(out, `newest_date=${newestDate}\n`);
            fs.appendFileSync(out, `newest_case=${newest.attributes.CASE_NUMBER}\n`);
          }

          main().catch(e => { console.error(e.message); process.exit(1); });
          EOF

      - name: Ensure label exists and check for existing open monitor issue
        if: steps.check.outputs.feed_resumed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "alpharetta-monitor" \
            --repo "${{ github.repository }}" \
            --color "e4a853" \
            --description "Alpharetta ArcGIS feed monitoring" \
            2>/dev/null || true

          COUNT=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "alpharetta-monitor" \
            --state open \
            --json number \
            --jq 'length')
          echo "open_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Create resume issue
        if: steps.check.outputs.feed_resumed == 'true' && steps.existing.outputs.open_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Alpharetta ArcGIS feed has resumed (newest: ${{ steps.check.outputs.newest_date }})" \
            --label "alpharetta-monitor" \
            --body "$(cat <<'BODY'
          The Alpharetta ArcGIS permit feed has started publishing new permits again.

          **Newest permit:** ${{ steps.check.outputs.newest_case }} — ${{ steps.check.outputs.newest_date }}
          **New permits found since stale cutoff:** ${{ steps.check.outputs.new_count }}

          The scraper will pick these up automatically on the next scheduled run (Mon/Wed/Fri 7:30 AM ET).

          You can close this issue and delete the `alpharetta-monitor.yml` workflow once you've confirmed the data is flowing normally.
          BODY
          )"
